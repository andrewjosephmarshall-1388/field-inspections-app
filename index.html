
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Inspections App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom, #0f172a, #1e293b, #0f172a);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 56rem;
            margin: 0 auto;
            padding: 1rem;
        }

        .header {
            background: linear-gradient(to right, #ea580c, #f97316);
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header h1 {
            font-size: 1.875rem;
            font-weight: bold;
            margin-bottom: 0.25rem;
        }

        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 0.875rem;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 0.5rem;
            padding: 0;
        }

        .back-btn:hover {
            color: rgba(255,255,255,0.7);
        }

        .list {
            display: grid;
            gap: 1rem;
        }

        .inspection-card {
            background: linear-gradient(to right, #475569, #1e293b);
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            width: 100%;
            font-family: inherit;
            color: inherit;
        }

        .inspection-card:hover {
            background: linear-gradient(to right, #334155, #0f172a);
            transform: scale(1.01);
        }

        .inspection-id {
            color: #f97316;
            font-weight: bold;
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }

        .inspection-type {
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .inspection-address {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
        }

        .inspection-date {
            color: #64748b;
            font-size: 0.75rem;
        }

        .section {
            background: rgba(71, 85, 105, 0.5);
            border: 1px solid #475569;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .section-title {
            color: #cbd5e1;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .detail-label {
            color: #cbd5e1;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .detail-value {
            color: #fff;
            font-size: 1.125rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        button {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .btn-primary {
            background: linear-gradient(to right, #ea580c, #f97316);
            color: white;
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
        }

        .btn-primary:hover {
            background: linear-gradient(to right, #c2410c, #ea580c);
        }

        .btn-secondary {
            background: #475569;
            color: white;
            margin-right: 0.5rem;
        }

        .btn-secondary:hover {
            background: #334155;
        }

        .btn-success {
            background: #16a34a;
            color: white;
        }

        .btn-success:hover {
            background: #15803d;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-warning {
            background: #ca8a04;
            color: white;
        }

        .btn-warning:hover {
            background: #a16207;
        }

        .btn-info {
            background: #0284c7;
            color: white;
        }

        .btn-info:hover {
            background: #0369a1;
        }

        .status-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .status-btn {
            padding: 0.75rem;
            border: 2px solid #475569;
            background: rgba(30, 41, 59, 0.5);
            color: #cbd5e1;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .status-btn.active {
            border-color: #f97316;
            background: rgba(249, 115, 22, 0.2);
            color: #f97316;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: white;
            font-family: monospace;
            font-size: 0.875rem;
            resize: vertical;
            min-height: 8rem;
            margin-bottom: 1rem;
        }

        textarea:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        }

        input[type="file"] {
            display: none;
        }

        .photo-list {
            display: grid;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .photo-item {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #475569;
            border-radius: 0.5rem;
            padding: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #cbd5e1;
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .hidden {
            display: none;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1rem;
        }

        .modal-content {
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            max-width: 32rem;
            max-height: 90vh;
            overflow-y: auto;
            padding: 1rem;
        }

        .modal-close {
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            margin-bottom: 1rem;
            padding: 0;
            background: none;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal img {
            width: 100%;
            height: auto;
            max-height: 24rem;
            object-fit: contain;
            margin-bottom: 1rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // App State
        let inspections = [];
        let selectedInspection = null;
        let notes = {};
        let photos = {};
        let inspectionStatus = {};
        let photoViewerOpen = null;
        let currentPhotoIndex = 0;

        // Load from localStorage
        function loadData() {
            const savedNotes = localStorage.getItem('inspectionNotes');
            const savedPhotos = localStorage.getItem('inspectionPhotos');
            const savedStatus = localStorage.getItem('inspectionStatus');
            
            if (savedNotes) notes = JSON.parse(savedNotes);
            if (savedPhotos) photos = JSON.parse(savedPhotos);
            if (savedStatus) inspectionStatus = JSON.parse(savedStatus);

            if (inspections.length === 0) {
                loadSampleData();
            }
        }

        function loadSampleData() {
            inspections = [
                { id: 290682, date: '4/24/2026', type: 'I560 - HVAC RESIDENTIAL FINAL', address: '1009 BELL GROVE LN', inspector: '1088' },
                { id: 277625, date: '4/23/2026', type: 'I560 - HVAC RESIDENTIAL FINAL', address: '24 STONEHOUSE CT', inspector: '1088' },
                { id: 294362, date: '4/22/2026', type: 'I555 - HVAC RESIDENTIAL ROUGH IN', address: '5009 FINLEN LN', inspector: '1088' },
                { id: 293422, date: '4/21/2026', type: 'I555 - HVAC RESIDENTIAL ROUGH IN', address: '5210 CASTLEBAR DR', inspector: '1088' },
                { id: 299082, date: '4/20/2026', type: 'I555 - HVAC RESIDENTIAL ROUGH IN', address: '1211 ELMWOOD ST', inspector: '1088' }
            ];
        }

        function saveData() {
            localStorage.setItem('inspectionNotes', JSON.stringify(notes));
            localStorage.setItem('inspectionPhotos', JSON.stringify(photos));
            localStorage.setItem('inspectionStatus', JSON.stringify(inspectionStatus));
        }

        function handleCSVUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const csv = e.target.result;
                const lines = csv.split('\n');
                
                const newInspections = lines.slice(1)
                    .filter(line => line.trim())
                    .map(line => {
                        const values = line.split(',').map(v => v.trim());
                        return {
                            id: values[0],
                            date: values[1],
                            type: values[2],
                            inspector: values[3],
                            address: values[5]
                        };
                    });
                
                inspections = newInspections;
                render();
            };
            reader.readAsText(file);
        }

        function handlePhotoCapture(inspectionId) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.capture = 'environment';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    if (!photos[inspectionId]) photos[inspectionId] = [];
                    photos[inspectionId].push({
                        data: event.target.result,
                        timestamp: new Date().toLocaleString(),
                        id: Date.now()
                    });
                    saveData();
                    render();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function removePhoto(inspectionId, index) {
            photos[inspectionId] = photos[inspectionId].filter((_, i) => i !== index);
            saveData();
            render();
        }

        function openGoogleMaps(address) {
            const encodedAddress = encodeURIComponent(address);
            window.open(`https://www.google.com/maps/search/${encodedAddress}`, '_blank');
        }

        function emailInspectionResults(inspId) {
            const insp = inspections.find(i => i.id == inspId);
            if (!insp) return;
            
            const currentNotes = notes[inspId] || 'No notes added';
            const currentPhotos = photos[inspId] || [];
            const currentStatus = inspectionStatus[inspId] || 'Not marked';

            const statusLabel = 
                currentStatus === 'pass' ? '✅ PASS' :
                currentStatus === 'fail' ? '❌ FAIL' :
                currentStatus === 'pending' ? '⏳ PENDING' :
                '⚪ NOT MARKED';

            const emailBody = `Inspection Report\n\nInspection ID: ${insp.id}\nAddress: ${insp.address}\nInspection Type: ${insp.type}\nScheduled Date: ${insp.date}\n\nStatus: ${statusLabel}\n\nNotes:\n${currentNotes}\n\nPhotos Attached: ${currentPhotos.length}\n\n---\nGenerated on ${new Date().toLocaleString()}`;

            const subject = `Inspection Report - ${insp.id} - ${insp.address}`;
            const mailtoLink = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(emailBody)}`;
            
            window.location.href = mailtoLink;
        }

        function renderListView() {
            return `
                <div class="container">
                    <div class="header">
                        <h1>Field Inspections</h1>
                        <p>${inspections.length} inspections loaded</p>
                    </div>

                    <div class="button-group">
                        <button class="btn-secondary" onclick="document.getElementById('csvInput').click()">📥 Import CSV</button>
                        <input type="file" id="csvInput" accept=".csv" onchange="handleCSVUpload(event)">
                        <button class="btn-secondary" onclick="exportData()">📥 Export Data</button>
                    </div>

                    <div class="list">
                        ${inspections.length === 0 ? '<p style="text-align: center; color: #94a3b8;">No inspections loaded</p>' : ''}
                        ${inspections.map(insp => `
                            <button class="inspection-card" onclick="selectInspection(${insp.id})">
                                <div class="inspection-id">#${insp.id}</div>
                                <div class="inspection-type">${insp.type}</div>
                                <div class="inspection-address">📍 ${insp.address}</div>
                                <div class="inspection-date">🕐 ${insp.date}</div>
                                ${notes[insp.id] ? '<div style="color: #cbd5e1; font-size: 0.75rem; margin-top: 0.5rem;">📝 Notes</div>' : ''}
                                ${photos[insp.id]?.length > 0 ? `<div style="color: #cbd5e1; font-size: 0.75rem;">📷 ${photos[insp.id].length} photos</div>` : ''}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderDetailView() {
            const insp = inspections.find(i => i.id == selectedInspection);
            if (!insp) return renderListView();

            const currentNotes = notes[insp.id] || '';
            const currentPhotos = photos[insp.id] || [];
            const currentStatus = inspectionStatus[insp.id] || null;

            return `
                <div class="container">
                    <div class="header">
                        <button class="back-btn" onclick="selectInspection(null)">← Back to List</button>
                        <h1>Inspection #${insp.id}</h1>
                    </div>

                    <div class="section">
                        <div class="detail-label">Address</div>
                        <div class="detail-value">${insp.address}</div>
                        <div class="button-group">
                            <button class="btn-info" onclick="openGoogleMaps('${insp.address.replace(/'/g, "\\'")}')">📍 Directions</button>
                            <button class="btn-success" onclick="emailInspectionResults(${insp.id})">📧 Email</button>
                        </div>

                        <div class="grid-2">
                            <div>
                                <div class="detail-label">Type</div>
                                <div style="color: white; font-size: 0.875rem;">${insp.type}</div>
                            </div>
                            <div>
                                <div class="detail-label">Date</div>
                                <div style="color: white; font-size: 0.875rem;">${insp.date}</div>
                            </div>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">Inspection Status</div>
                        <div class="status-buttons">
                            <button class="status-btn ${currentStatus === 'pass' ? 'active' : ''}" onclick="setStatus(${insp.id}, 'pass')">✅ Pass</button>
                            <button class="status-btn ${currentStatus === 'fail' ? 'active' : ''}" onclick="setStatus(${insp.id}, 'fail')">❌ Fail</button>
                            <button class="status-btn ${currentStatus === 'pending' ? 'active' : ''}" onclick="setStatus(${insp.id}, 'pending')">⏳ Pending</button>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">📝 Notes</div>
                        <textarea id="notesInput" placeholder="Add inspection notes..." onchange="setNotes(${insp.id}, this.value)">${currentNotes}</textarea>
                    </div>

                    <div class="section">
                        <div class="section-title">📷 Photos (${currentPhotos.length})</div>
                        <button class="btn-primary" onclick="handlePhotoCapture(${insp.id})">📷 Take or Upload Photo</button>
                        
                        <div class="photo-list">
                            ${currentPhotos.length === 0 ? '<p style="color: #94a3b8; text-align: center; padding: 1rem;">No photos yet</p>' : ''}
                            ${currentPhotos.map((photo, idx) => `
                                <div class="photo-item">
                                    <span style="cursor: pointer; flex: 1;" onclick="openPhotoViewer(${insp.id}, ${idx})">📷 ${photo.timestamp}</span>
                                    <button class="btn-danger" style="padding: 0.5rem; font-size: 0.75rem;" onclick="removePhoto(${insp.id}, ${idx})">✕</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>

                ${photoViewerOpen === insp.id && currentPhotos.length > 0 ? `
                    <div class="modal">
                        <div class="modal-content">
                            <button class="modal-close" onclick="closePhotoViewer()">✕</button>
                            <img src="${currentPhotos[currentPhotoIndex].data}" alt="Photo">
                            <p style="color: #cbd5e1; font-size: 0.875rem; margin-bottom: 1rem;">${currentPhotos[currentPhotoIndex].timestamp}</p>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <button class="btn-secondary" onclick="previousPhoto()" ${currentPhotoIndex === 0 ? 'disabled' : ''}>← Previous</button>
                                <span style="color: #cbd5e1;">${currentPhotoIndex + 1} / ${currentPhotos.length}</span>
                                <button class="btn-secondary" onclick="nextPhoto()" ${currentPhotoIndex === currentPhotos.length - 1 ? 'disabled' : ''}>Next →</button>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
        }

        function render() {
            const app = document.getElementById('app');
            if (selectedInspection) {
                app.innerHTML = renderDetailView();
                const textarea = document.getElementById('notesInput');
                if (textarea) {
                    textarea.value = notes[selectedInspection] || '';
                }
            } else {
                app.innerHTML = renderListView();
            }
        }

        function selectInspection(id) {
            selectedInspection = id;
            render();
        }

        function setStatus(id, status) {
            inspectionStatus[id] = status;
            saveData();
            render();
        }

        function setNotes(id, text) {
            notes[id] = text;
            saveData();
        }

        function openPhotoViewer(id, idx) {
            photoViewerOpen = id;
            currentPhotoIndex = idx;
            render();
        }

        function closePhotoViewer() {
            photoViewerOpen = null;
            render();
        }

        function previousPhoto() {
            if (currentPhotoIndex > 0) currentPhotoIndex--;
            render();
        }

        function nextPhoto() {
            const insp = inspections.find(i => i.id == photoViewerOpen);
            const currentPhotos = photos[insp.id] || [];
            if (currentPhotoIndex < currentPhotos.length - 1) currentPhotoIndex++;
            render();
        }

        function exportData() {
            const data = {
                inspections,
                notes,
                inspectionStatus,
                exportDate: new Date().toLocaleString()
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `inspection-data-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Initialize
        loadData();
        render();
    </script>
</body>
</html>
